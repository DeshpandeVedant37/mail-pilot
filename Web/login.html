<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailPilot — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-500: #3b82f6;
      --brand-600: #2563eb;
      --gradient-brand: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      --gradient-sky: linear-gradient(180deg, #e0f0ff 0%, #f0f7ff 40%, #ffffff 100%);
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--gradient-sky);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* floating blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: rgba(59,130,246,0.12);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: rgba(6,182,212,0.10);
      bottom: -80px; right: -80px;
    }

    /* ── Card ── */
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 44px 40px 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      animation: cardIn 0.55s cubic-bezier(0.25,0,0.1,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .auth-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .auth-brand img { width: 40px; height: 40px; object-fit: contain; }
    .auth-brand span {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--gray-900);
    }

    /* ── Tabs ── */
    .auth-tabs {
      display: flex;
      background: var(--gray-200);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .auth-tab.active {
      background: #fff;
      color: var(--gray-900);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* ── Heading ── */
    .auth-heading {
      font-family: var(--font-display);
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .auth-sub {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-700);
      letter-spacing: 0.02em;
    }
    .form-group input {
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--gray-800);
      background: rgba(255,255,255,0.9);
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* ── Forgot ── */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
    }
    .forgot-link {
      font-size: 0.78rem;
      color: var(--brand-500);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ── Submit btn ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: var(--gradient-brand);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(59,130,246,0.45);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--gray-400);
      font-size: 0.78rem;
      font-weight: 500;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ── Google btn ── */
    .btn-google {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      background: #fff;
      color: var(--gray-700);
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .btn-google:hover {
      border-color: var(--gray-300);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Error / Success msg ── */
    .auth-msg {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 10px;
      display: none;
    }
    .auth-msg.error  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .auth-msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }

    /* ── Back link ── */
    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--gray-400);
      text-decoration: none;
      margin-top: 20px;
      justify-content: center;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gray-700); }

    /* ── Panel toggle ── */
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- Brand -->
    <a href="index.html" class="auth-brand">
      <img src="Product Logo/MailPilot Logo.png" alt="MailPilot" />
      <span>MailPilot</span>
    </a>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Log In</button>
      <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Error / success -->
    <div class="auth-msg" id="authMsg"></div>

    <!-- ── LOGIN PANEL ── -->
    <div class="auth-panel active" id="panelLogin">
      <p class="auth-heading">Welcome back</p>
      <p class="auth-sub">Sign in to your MailPilot account.</p>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <div class="forgot-row">
          <a class="forgot-link" id="forgotLink">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">Log In</button>
      </form>

      <div class="divider" style="margin-top:16px;">or</div>

      <button class="btn-google" id="googleLoginBtn">
        <!-- Google icon -->
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- ── SIGNUP PANEL ── -->
    <div class="auth-panel" id="panelSignup">
      <p class="auth-heading">Create account</p>
      <p class="auth-sub">Start your free MailPilot journey today.</p>

      <form class="auth-form" id="signupForm">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Arjun Kumar" required />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="btn-submit" id="signupBtn">Create Account</button>
      </form>

      <div class="divider" style="margin-top:16px;">or</div>

      <button class="btn-google" id="googleSignupBtn">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Continue with Google
      </button>
    </div>

    <a href="index.html" class="back-link">
      ← Back to MailPilot
    </a>

  </div>

  <script type="module">
    import { signUp, logIn, googleSignIn, onAuthChange } from './auth.js';

    // Redirect if already logged in
    onAuthChange(user => {
      if (user) window.location.href = 'index.html';
    });

    const msg = document.getElementById('authMsg');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'auth-msg ' + type;
    }
    function clearMsg() { msg.className = 'auth-msg'; }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
    }

    // Store original labels
    document.querySelectorAll('.btn-submit').forEach(b => b.dataset.label = b.textContent);

    // ── Tab switch ──
    window.switchTab = function(tab) {
      clearMsg();
      document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
      document.getElementById('panelSignup').classList.toggle('active', tab === 'signup');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    };

    // ── Login ──
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearMsg();
      const btn = document.getElementById('loginBtn');
      setLoading(btn, true);
      try {
        await logIn(
          document.getElementById('loginEmail').value.trim(),
          document.getElementById('loginPassword').value
        );
        showMsg('Logged in! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (err) {
        showMsg(friendlyError(err.code), 'error');
        setLoading(btn, false);
      }
    });

    // ── Sign Up ──
    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearMsg();
      const btn = document.getElementById('signupBtn');
      setLoading(btn, true);
      try {
        await signUp(
          document.getElementById('signupName').value.trim(),
          document.getElementById('signupEmail').value.trim(),
          document.getElementById('signupPassword').value
        );
        showMsg('Account created! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (err) {
        showMsg(friendlyError(err.code), 'error');
        setLoading(btn, false);
      }
    });

    // ── Google (both panels) ──
    async function handleGoogle() {
      clearMsg();
      try {
        await googleSignIn();
        window.location.href = 'index.html';
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showMsg(friendlyError(err.code), 'error');
        }
      }
    }
    document.getElementById('googleLoginBtn').addEventListener('click', handleGoogle);
    document.getElementById('googleSignupBtn').addEventListener('click', handleGoogle);

    // ── Forgot password ──
    document.getElementById('forgotLink').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) { showMsg('Enter your email above first.', 'error'); return; }
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js").then(({ sendPasswordResetEmail, getAuth }) => {
        sendPasswordResetEmail(getAuth(), email)
          .then(() => showMsg('Reset email sent! Check your inbox.', 'success'))
          .catch(err => showMsg(friendlyError(err.code), 'error'));
      });
    });

    // ── Error messages ──
    function friendlyError(code) {
      const map = {
        'auth/user-not-found':       'No account found with this email.',
        'auth/wrong-password':       'Incorrect password. Try again.',
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/too-many-requests':    'Too many attempts. Please try again later.',
        'auth/network-request-failed': 'Network error. Check your connection.',
        'auth/invalid-credential':   'Invalid email or password.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
